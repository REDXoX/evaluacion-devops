name: CI/CD Innovatech

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v3

      - name: Login en Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build y Push Backend
        run: |
          # Usamos ./backend porque la carpeta está en la raíz de tu GitHub
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/innovatech-backend:latest ./backend
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/innovatech-backend:latest

      - name: Build y Push Frontend
        run: |
          # Usamos ./FRONTEND en mayúsculas para que coincida con tu repo
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/innovatech-frontend:latest ./FRONTEND
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/innovatech-frontend:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Despliegue vía SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST_DNS }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/
            if [ ! -d "proyecto" ]; then mkdir proyecto; fi
            cd proyecto
            # Asegúrate de que docker-compose.yml esté en esta carpeta del servidor
            sudo docker compose pull
            sudo docker compose up -d
