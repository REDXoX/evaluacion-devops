name: CI/CD Innovatech

on:
  push:
    [cite_start]branches: [ "deploy" ] 

jobs:

  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v3

      - name: Login en Docker Hub
        uses: docker/login-action@v2
        with:
          [cite_start]username: ${{ secrets.DOCKERHUB_USERNAME }} 
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build y Push Backend
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/innovatech-backend:latest ./backend
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/innovatech-backend:latest

      - name: Build y Push Frontend
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/innovatech-frontend:latest ./frontend
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/innovatech-frontend:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Despliegue vía SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Comandos que se ejecutan dentro de tu AWS EC2 [cite: 42, 112]
            cd /home/ec2-user/proyecto
            docker-compose pull
            docker-compose up -d
