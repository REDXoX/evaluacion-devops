name: CI/CD Innovatech

on:
  push:
    branches: [ "main" ] # Cambiado a main para que coincida con tu repositorio

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v3

      - name: Login en Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build y Push Backend
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/innovatech-backend:latest ./backend
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/innovatech-backend:latest

      - name: Build y Push Frontend
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/innovatech-frontend:latest ./frontend
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/innovatech-frontend:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Despliegue vía SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST_DNS }} # Usando el nombre que ya tienes en tus secrets
          username: ubuntu # Cambiado de ec2-user a ubuntu porque tu imagen es Ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Comandos para tu servidor Ubuntu
            cd /home/ubuntu/
            if [ ! -d "proyecto" ]; then mkdir proyecto; fi
            cd proyecto
            # Aquí deberías tener tu archivo docker-compose.yml
            sudo docker-compose pull
            sudo docker-compose up -d
