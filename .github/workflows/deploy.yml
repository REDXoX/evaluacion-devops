name: CI/CD Innovatech

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v3

      - name: Login en Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build y Push Backend
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/innovatech-backend:latest ./Devopss/backend
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/innovatech-backend:latest

      - name: Build y Push Frontend
        run: |
          # CORRECCIÓN: FRONTEND debe ir en MAYÚSCULAS para coincidir con tu carpeta
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/innovatech-frontend:latest ./Devopss/FRONTEND
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/innovatech-frontend:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Despliegue vía SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST_DNS }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/
            if [ ! -d "proyecto" ]; then mkdir proyecto; fi
            cd proyecto
            # Recuerda subir tu archivo docker-compose.yml a esta carpeta en el servidor
            sudo docker compose pull
            sudo docker compose up -d
